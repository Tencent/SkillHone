# Forgejo Docker Compose
# -----------------------------------------------------------------------------
# Usage:
#   docker compose -f skills/skillhone/assets/docker-compose.yml up -d
#
# Full bring-up instructions (admin user creation, PAT generation,
# settings.json wiring) live in docs/install/developer.md.
#
# This compose is pre-configured for ready-to-use boot: SQLite + INSTALL_LOCK
# is set via FORGEJO__* env vars, so Forgejo skips the Web install wizard.
# Forgejo listens on http://localhost:3000; SSH is mapped to host port 2222.
# Override the host ports with FORGEJO_HTTP_PORT / FORGEJO_SSH_PORT if 3000
# or 2222 are taken.
# -----------------------------------------------------------------------------

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:9
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # -- Skip the Web install wizard (pre-configure SQLite + lock install) --
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__database__PATH=/data/gitea/gitea.db
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__server__ROOT_URL=http://localhost:${FORGEJO_HTTP_PORT:-3000}/
      - FORGEJO__server__SSH_DOMAIN=localhost
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__PROTOCOL=http
      # Disable public sign-up; admins are created via the `forgejo admin user
      # create` CLI command (see docs/install/developer.md).
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=false
      - FORGEJO__log__MODE=console
    restart: unless-stopped
    volumes:
      # Persistent data: repos, database, config.
      - forgejo-data:/data
    ports:
      # Web UI / API (host port controlled by FORGEJO_HTTP_PORT, default 3000).
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      # SSH for git clone/push (host port controlled by FORGEJO_SSH_PORT,
      # default 2222).
      - "${FORGEJO_SSH_PORT:-2222}:22"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  forgejo-data:
    driver: local
